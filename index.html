<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#2d6bff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google AdSense. For EEA/UK/CH traffic, enable a Google-certified consent management
         platform in AdSense › Privacy & messaging. -->
    <meta name="google-adsense-account" content="ca-pub-2980943706375055" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2980943706375055"
      crossorigin="anonymous"
    ></script>

    <!-- Fonts: preconnect + single stylesheet (replaces the render-blocking CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />

    <!-- Per-route <title>, description, canonical, og:title/description/url are injected
         per page by the prerender step (see prerender.mjs + src/seo.js). The <title>
         below is a fallback used in dev and replaced at prerender time. -->
    <title>DevWay · Learn Web Development the Right Way</title>

    <!-- Open Graph / Twitter — site-level constants (per-route title/description added at prerender) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DevWay" />
    <meta property="og:image" content="https://learn-react.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DevWay — Learn Web Development the Right Way" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://learn-react.com/og-image.png" />
    <meta name="twitter:image:alt" content="DevWay — Learn Web Development the Right Way" />

    <!-- Structured data: site-wide. Per-page Course / BreadcrumbList JSON-LD is rendered by each route. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "DevWay",
        "url": "https://learn-react.com/",
        "logo": "https://learn-react.com/favicon.svg",
        "description": "DevWay — Learn web development the right way. Structured, hands-on courses across frontend, backend and the cloud, with progress tracking."
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "DevWay",
        "url": "https://learn-react.com/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
